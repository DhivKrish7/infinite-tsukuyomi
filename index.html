<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusCRM — Trading Platform Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1219;
    --surface2: #111a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8edf2;
    --muted: #5a6a7a;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --green: #00e5a0;
    --red: #ff4d6a;
    --orange: #ff9f43;
    --purple: #a78bfa;
    --gold: #f5c842;
    --glow: rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 72px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
    flex-shrink: 0;
    z-index: 100;
  }

  .sidebar-logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #000;
    margin-bottom: 16px;
  }

  .sidebar-divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  .nav-item {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(0,212,255,0.12); color: var(--accent); }
  .nav-item svg { width: 18px; height: 18px; }

  .nav-item .tooltip {
    position: absolute;
    left: 52px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .nav-item:hover .tooltip { opacity: 1; }

  .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPBAR */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }

  .topbar-sub {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--green);
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #a78bfa, #00d4ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #000;
    cursor: pointer;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* PLATFORM MANAGER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #00b8e0; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  .btn-danger {
    background: rgba(255,77,106,0.12);
    color: var(--red);
    border: 1px solid rgba(255,77,106,0.2);
  }

  .btn-danger:hover { background: rgba(255,77,106,0.2); }

  /* PLATFORM CARDS */
  .platforms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .platform-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .platform-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--platform-color, var(--accent));
    opacity: 0.8;
  }

  .platform-card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .platform-card.plugged { border-color: rgba(0,229,160,0.2); }
  .platform-card.unplugged { opacity: 0.6; }

  .platform-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .platform-logo {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .platform-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .platform-type {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .plug-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .toggle-track {
    width: 34px;
    height: 19px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    position: relative;
    transition: background 0.25s;
  }

  .toggle-track.on { background: rgba(0,229,160,0.25); border-color: rgba(0,229,160,0.4); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.25s;
  }

  .toggle-track.on .toggle-thumb {
    left: 17px;
    background: var(--green);
    box-shadow: 0 0 6px rgba(0,229,160,0.6);
  }

  .platform-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .pstat {
    text-align: center;
  }

  .pstat-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .pstat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  /* ADD PLATFORM CARD */
  .platform-card.add-new {
    border: 1px dashed var(--border2);
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    min-height: 180px;
    transition: all 0.2s;
  }

  .platform-card.add-new:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
    transform: translateY(-1px);
  }

  .add-new-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px dashed var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.2s;
  }

  .platform-card.add-new:hover .add-new-icon {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }

  .stat-change {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--red); }

  .stat-icon {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
  }

  /* TWO-COL */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 14px;
    align-items: start;
  }

  /* TABLE */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }

  .card-meta {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 10px 20px;
    text-align: left;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }

  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  tbody td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:last-child td { border-bottom: none; }

  .user-cell { display: flex; align-items: center; gap: 10px; }

  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .user-name { font-weight: 500; font-size: 13px; margin-bottom: 1px; }
  .user-email { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .badge-green { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.2); }
  .badge-red { background: rgba(255,77,106,0.12); color: var(--red); border: 1px solid rgba(255,77,106,0.2); }
  .badge-blue { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .badge-orange { background: rgba(255,159,67,0.12); color: var(--orange); border: 1px solid rgba(255,159,67,0.2); }
  .badge-purple { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

  .platform-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  .mono { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ACTIVITY */
  .activity-list { padding: 0; }

  .activity-item {
    padding: 12px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .activity-item:hover { background: rgba(255,255,255,0.02); }
  .activity-item:last-child { border-bottom: none; }

  .activity-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .activity-icon svg { width: 13px; height: 13px; }

  .activity-text { font-size: 12px; line-height: 1.5; }
  .activity-text strong { font-weight: 600; }
  .activity-time {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 3px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 18px;
    width: 480px;
    max-width: 90vw;
    padding: 28px;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.2s;
  }

  .modal-overlay.show .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Instrument Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .form-select {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Instrument Sans', sans-serif;
    outline: none;
    appearance: none;
    cursor: pointer;
  }

  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-option {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .color-option.selected { border-color: white; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* MINI CHART */
  .mini-chart { display: flex; align-items: flex-end; gap: 2px; height: 30px; }
  .chart-bar {
    width: 4px;
    border-radius: 2px;
    transition: height 0.3s;
  }

  /* FILTER PILLS */
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }

  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }

  .pill:hover { border-color: var(--border2); color: var(--text); }
  .pill.active { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.3); color: var(--accent); }

  /* SCROLL VIEW */
  .page { display: none; }
  .page.active { display: contents; }

  /* NOTIFICATION DOT */
  .notif-dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--red);
    border: 1.5px solid var(--surface);
  }

  /* KYC/AML summary */
  .kyc-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.02);
    border-top: 1px solid var(--border);
  }

  .kyc-item { text-align: center; }
  .kyc-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; }
  .kyc-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 2px; text-transform: uppercase; }

  /* Sparkline */
  svg.sparkline { overflow: visible; }

  /* Responsive tweak */
  @media (max-width: 1100px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .platforms-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">NX</div>

    <div class="nav-item active" onclick="setPage('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="tooltip">Overview</span>
    </div>

    <div class="nav-item" onclick="setPage('clients')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
      <span class="tooltip">Clients</span>
    </div>

    <div class="nav-item" onclick="setPage('platforms')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="tooltip">Platforms</span>
    </div>

    <div class="nav-item" onclick="setPage('deposits')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="tooltip">Deposits</span>
    </div>

    <div class="nav-item" onclick="setPage('kyc')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="tooltip">KYC / AML</span>
    </div>

// ============================================================
// PLATFORM TOGGLE / REMOVE
// ============================================================
function togglePlatform(id) {
  const p = getPlatform(id);
  if (!p) return;
  p.plugged = !p.plugged;
  updateFilterPills();
  renderPage();
}

function removePlatform(id) {
  const idx = platforms.findIndex(p => p.id === id);
  if (idx > -1) {
    platforms.splice(idx, 1);
    if (platformFilter === id) platformFilter = 'all';
    updateFilterPills();
    renderPage();
  }
}

// ============================================================
// FILTER
// ============================================================
function filterPlatform(id, el) {
  platformFilter = id;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderPage();
}

function updateFilterPills() {
  const container = document.getElementById('platform-filter');
  if (!container) return;

  // Remove old platform pills (not "All")
  container.querySelectorAll('.pill:not([onclick*="all"])').forEach(el => el.remove());

  // Re-add connected platforms
  platforms.filter(p => p.plugged).forEach(p => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (platformFilter === p.id ? ' active' : '');
    pill.id = `pill-${p.id}`;
    pill.textContent = p.name;
    pill.onclick = function() { filterPlatform(p.id, this); };
    container.appendChild(pill);
  });

  // Keep "All" correct
  const allPill = container.querySelector('.pill');
  if (allPill) {
    allPill.classList.toggle('active', platformFilter === 'all');
  }
}

// ============================================================
// MODAL
// ============================================================
function openModal() {
  document.getElementById('add-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('show');
}

document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// color picker
document.getElementById('color-picker').addEventListener('click', function(e) {
  const opt = e.target.closest('.color-option');
  if (!opt) return;
  document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
  opt.classList.add('selected');
  selectedColor = opt.dataset.color;
});

function addPlatform() {
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  const api = document.getElementById('new-api').value.trim() || `https://api.${name.toLowerCase().replace(/\s+/g,'')}.com/v1`;

  if (!name) { document.getElementById('new-name').focus(); return; }

  const id = name.toLowerCase().replace(/\s+/g,'');
  const newP = {
    id, name, type, color: selectedColor, plugged: true,
    clients: 0, deposits: '$0', volume: '$0',
    api, joined: new Date().toISOString().slice(0,10),
  };

  platforms.push(newP);
  closeModal();
  document.getElementById('new-name').value = '';
  document.getElementById('new-api').value = '';
  updateFilterPills();
  renderPage();
}

// ============================================================
// INIT
// ============================================================
renderPage();
</script>
</body>
</html>
